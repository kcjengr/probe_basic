# example of a machine specific settings
windows:
  mainwindow:
    kwargs:
      confirm_exit: false

data_plugins:
  status:
    provider: qtpyvcp.plugins.status:Status
    kwargs:
      cycle_time: 30

  clock:
    provider: qtpyvcp.plugins.clock:Clock

  tooltable:
    provider: qtpyvcp.plugins.tool_table:ToolTable
    kwargs:
        columns: TXYZABCDR

  persistent_data_manager:
    provider: qtpyvcp.plugins.persistent_data_manager:PersistentDataManager
    kwargs:
      # serialization method to use: json or pickle
      serialization_method: pickle
      # persistence_file: .vcp_data.json

  notifications:
    provider: qtpyvcp.plugins.notifications:Notifications
    kwargs:
      # show notification popups
      enabled: True
      # "native" or "dbus"
      mode: native
      # max number of notifications to show
      max_messages: 5
      # whether to save messages on exit
      persistent: True

settings:
  # VTK backplot view settings

  backplot.show-grid:
    default_value: false

  backplot.show-program-bounds:
    default_value: false

  backplot.show-program-labels:
    default_value: false

  backplot.show-program-ticks:
    default_value: false

  backplot.show-machine-bounds:
    default_value: false

  backplot.show-machine-labels:
    default_value: false

  backplot.show-machine-ticks:
    default_value: false

  backplot.perspective-view:
    default_value: false

#  backplot.view:
#    default_value: P
#    options: ["X: Front View", "XZ: Lathe View", "XZ2: Lathe View", "Y: Front View", "Z: Top View", "Z2: Bottom View", "P: Isometric"]

  backplot.multitool-colors:
    default_value: true

  # camera settings
  
  camera.device:
    default_value: /dev/video0
  
  camera.gst-flag:
    default_value: false
  
  camera.px-mm:
    default_value: 1.0
  
  camera.calibration-file:
    default_value: "calibration.yml"
    
  # croshair settings
  
  croshairs.vertical:
    default_value: 0
    
  croshairs.horizontal:
    default_value: 0
    
  croshairs.radious:
    default_value: 25
    
  # edje detect settings
    
  edje.min-threshold:
    default_value: 190
    
  edje.max-threshold:
    default_value: 200
    
  # hole detect settings
  
  hole.dp:
    default_value: 1
     
  hole.min-dist:
    default_value: 20

  hole.param1:
    default_value: 40
    
  hole.param2:
    default_value: 50
    
  hole.min-radious:
    default_value: 1
    
  hole.max-radious:
    default_value: 20
    
  # slot detect settings
    
    
    
    

  # Clean-slate runtime syntax toggle (single source path only).
  gcode-syntax.on-off:
    description: on off setting for using gcode syntax highlighting in gcode editor
    default_value: true
    persistent: true

# Global editor style defaults moved from QSS.
# Runtime should apply these values so QSS no longer owns editor defaults.
gcode_editor_style_defaults:
  background_color: "{{ '#6c6c6c' if effective_theme_color('DISPLAY', 'THEME_COLOR', 'light') == 'dark' else '#dfdfdf' }}"
  text_color: "{{ '#ffffff' if effective_theme_color('DISPLAY', 'THEME_COLOR', 'light') == 'dark' else '#000000' }}"
  padding: 2
  font_family: "Probe Basic Bebas Mono"
  font_point_size: 13
  font_style: normal
  font_weight: 400
  letter_spacing: 0.5
  word_spacing: 2
  border_radius: 4

  line_number_area_background: "{{ '#505050' if effective_theme_color('DISPLAY', 'THEME_COLOR', 'light') == 'dark' else '#cdcdcd' }}"
  line_number_area_color: "{{ '#ffffff' if effective_theme_color('DISPLAY', 'THEME_COLOR', 'light') == 'dark' else '#000000' }}"
  line_number_font_family: "Probe Basic Bebas Mono"
  line_number_font_point_size: 11
  line_number_font_weight: 400
  line_number_font_italic: false

  current_line_highlight_enabled: true
  current_line_background: "#6c6ef0"
  current_line_color: "#ffffff"
  find_highlight_background: "#2848b9"
  find_highlight_text: "#ffffff"
  find_error_background: "#ff0000"
  find_error_text: "#ffffff"
  find_status_background: "#5a5a5a"
  find_status_text: "#ffffff"
  find_status_border: "#5f5f5f"

# Runtime-applied syntax profile.
# Single source of truth for token-group highlighting.
# Tokens not listed in syntax_styles use the editor default text color.
gcode_syntax_profile:
  version: 4
  model: flat-token-groups
  source_of_truth: syntax_styles
  note: "Flat color mapping. Add/remove tokens per style; unknown tokens use editor default color."
  default_color: "{{ '#ffffff' if effective_theme_color('DISPLAY', 'THEME_COLOR', 'light') == 'dark' else '#000000' }}"
  precedence:
    - syntax_styles
  color_resolution_order:
    - group.color
    - setting.default_value
  syntax_styles:
    - id: Syntax_style_1
      setting: gcode-syntax.user-color-1
      color: "{{ '#f0ddb8' if effective_theme_color('DISPLAY', 'THEME_COLOR', 'light') == 'dark' else '#1a5c9e' }}"
      tokens: [G]

    - id: Syntax_style_2
      setting: gcode-syntax.user-color-2
      color: "{{ '#cce7f8' if effective_theme_color('DISPLAY', 'THEME_COLOR', 'light') == 'dark' else '#2d5e78' }}"
      tokens: [M]

    - id: Syntax_style_3
      setting: gcode-syntax.user-color-3
      color: "{{ '#ffffff' if effective_theme_color('DISPLAY', 'THEME_COLOR', 'light') == 'dark' else '#1a1a1a' }}"
      tokens: [X, Y, Z, A, B, C, U, V, W, I, J, K, R, Q, P, F]

    - id: Syntax_style_4
      setting: gcode-syntax.user-color-4
      color: "{{ '#d0f2ff' if effective_theme_color('DISPLAY', 'THEME_COLOR', 'light') == 'dark' else '#2a6890' }}"
      tokens: [number]

    - id: Syntax_style_5
      setting: gcode-syntax.user-color-5
      color: "{{ '#d4dce2' if effective_theme_color('DISPLAY', 'THEME_COLOR', 'light') == 'dark' else '#8a9898' }}"
      tokens: [semicolon, parenthesis, comment]

    - id: Syntax_style_6
      setting: gcode-syntax.user-color-6
      color: "{{ '#a8cce0' if effective_theme_color('DISPLAY', 'THEME_COLOR', 'light') == 'dark' else '#2a5a7a' }}"
      tokens: [S, H, T, single_quote, double_quote, string]
    




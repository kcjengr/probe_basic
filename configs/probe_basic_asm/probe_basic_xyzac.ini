[EMC]
VERSION = 1.1
MACHINE = QtPyVCP - probe_basic Sim
DEBUG = 0

[DISPLAY]
DISPLAY = probe_basic
THEME_COLOR = system
OPEN_FILE = /home/g0704/dev/probe_basic/example_gcode/
CONFIRM_EXIT = False
LOG_FILE = sim.log
LOG_LEVEL = DEBUG
ANTIALIAS = true
FPS = 60
PREFERENCE_FILE = sim.pref
CONFIG_FILE = custom_config.yml
POSITION = 0x0
POSITION_OFFSET = RELATIVE
POSITION_FEEDBACK = ACTUAL
MAX_FEED_OVERRIDE = 2.000000
MAX_SPINDLE_OVERRIDE = 2.000000
MIN_SPINDLE_OVERRIDE = 0.500000
DEFAULT_SPINDLE_SPEED = 300
DEFAULT_LINEAR_VELOCITY = 10.00000
MAX_LINEAR_VELOCITY = 10.000000
MIN_LINEAR_VELOCITY = 0.016670
DEFAULT_ANGULAR_VELOCITY = 36.000000
MAX_ANGULAR_VELOCITY = 3600.000000
MIN_ANGULAR_VELOCITY = 1.666667
PROGRAM_PREFIX = /home/g0704/dev/probe_basic/example_gcode/
INTRO_GRAPHIC = pbsplash.png
INTRO_TIME = 5
INCREMENTS = JOG .01in .001in .0001in
# USER_TABS_PATH = user_tabs/
USER_BUTTONS_PATH = user_buttons/
USER_DROS_PATH = user_dro_display/
DRO_DISPLAY = XYZAC
GEOMETRY = XYZAC
OFFSET_COLUMNS = XYZACR
TOOL_TABLE_COLUMNS = TZDR
KEYBOARD_JOG = true
KEYBOARD_JOG_SAFETY_OFF = true
ATC_TAB_DISPLAY = 0
NGCGUI_SUBFILE = subroutines/xyzac_switchkins_sub.ngc
NGCGUI_SUBFILE = subroutines/centering.ngc

[FILTER]
PROGRAM_EXTENSION = .nc,.txt,.tap Other NC files
PROGRAM_EXTENSION = .png,.gif,.jpg Greyscale Depth Image
    png = image-to-gcode
    gif = image-to-gcode
    jpg = image-to-gcode


[ATC]
POCKETS = 12
Z_TOOL_CHANGE_HEIGHT = -3.1900
Z_TOOL_CLEARANCE_HEIGHT = 0.0000
STEP_TIME = 500

[RS274NGC]
RS274NGC_STARTUP_CODE = F10 S300 G20 G17 G40 G49 G54 G64 P0.001 G80 G90 G91.1 G92.1 G94 G97 G98
PARAMETER_FILE = sim.var
OWORD_NARGS = 1
NO_DOWNCASE_OWORD = 1
HAL_PIN_VARS = 1
ON_ABORT_COMMAND = O<on_abort> CALL
USER_M_PATH = subroutines/
SUBROUTINE_PATH = subroutines
          REMAP = M428  modalgroup=10  ngc=428remap
          REMAP = M429  modalgroup=10  ngc=429remap
          REMAP = M430  modalgroup=10  ngc=430remap

[HALUI]
MDI_COMMAND = M429
MDI_COMMAND = M428
MDI_COMMAND = M430

[EMCMOT]
EMCMOT = motmod
COMM_TIMEOUT = 1.0
BASE_PERIOD = 100000
SERVO_PERIOD = 1000000

[TASK]
TASK = milltask
CYCLE_TIME = 0.010

[HAL]
HALCMD = net kinstype-select <= motion.analog-out-03 => motion.switchkins-type
HALCMD = net kins-tool-z xyzac-trt-kins.tool-offset motion.tooloffset.z
HALCMD = setp xyzac-trt-kins.y-offset  0
HALCMD = setp xyzac-trt-kins.z-offset  0
HALCMD = setp xyzac-trt-kins.x-rot-point 0
HALCMD = setp xyzac-trt-kins.y-rot-point 0
HALCMD = setp xyzac-trt-kins.z-rot-point -18
HALFILE = hallib/core_sim_5.hal
HALFILE = hallib/spindle_sim.hal
HALFILE = hallib/simulated_home_probe_basic.hal
HALFILE = hallib/sim_cannon.hal
HALUI = halui
POSTGUI_HALFILE = hallib/probe_basic_postgui.hal
TWOPASS = on

[VTK]
TRANSFORM_DEBUG = 1
ARC_DIVISION = 96
MACHINE_PARTS = machine.yml
X = table
Y = table
Z = head
A = table
C = table

[TRAJ]
AXES = 5
SPINDLES = 1
COORDINATES = X Y Z A C
HOME = 0 0 0 0 0
LINEAR_UNITS = inch
ANGULAR_UNITS = degree
DEFAULT_LINEAR_VELOCITY = 0.50
MAX_LINEAR_VELOCITY = 10.000

[EMCIO]
EMCIO = io
CYCLE_TIME = 0.100
TOOL_TABLE = tool.tbl

[KINS]
KINEMATICS = xyzac-trt-kins sparm=identityfirst
JOINTS = 5

#==================
#      X Axis
#==================

[AXIS_X]
MIN_LIMIT = -12.5000

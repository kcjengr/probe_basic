[APPLICATIONS]
DELAY = 5
APP = halshow --fformat %12.4f real-meca500.halshow

[EMC]
VERSION = 1.1
MACHINE = LinuxCNC-HAL-Meca500-EtherCAT-test
DEBUG = 0

[DISPLAY]
DISPLAY =                  cic01

# QtPyVCP Specific Options
CONFIRM_EXIT =             False
;FULLSCREEN =              False
;MAXIMIZE =                False
;POSITION =                0x0
SIZE =                     1280x700
HIDE_MENU_BAR =            False
HIDE_STATUS_BAR =          False
LOG_FILE =                 sim.log
LOG_LEVEL =                DEBUG
PREFERENCE_FILE =          sim.pref

POSITION_OFFSET =          RELATIVE
POSITION_FEEDBACK =        ACTUAL
DRO_FORMAT_MM =            %+010.4f
DRO_FORMAT_IN =            %+010.4f
CONE_BASESIZE =            0.25
MAX_FEED_OVERRIDE =        1.0
DEFAULT_SPINDLE_SPEED =    40000
MIN_SPINDLE_OVERRIDE =     0.5
MAX_SPINDLE_OVERRIDE =     1.0
PROGRAM_PREFIX =           ../../CIC0700
INTRO_TIME =               5
CYCLE_TIME =               0.05
HELP_FILE =                tklinuxcnc.txt
INTRO_GRAPHIC =            linuxcnc.gif
DEFAULT_LINEAR_VELOCITY =  400.0
MIN_VELOCITY =             0.0
MAX_LINEAR_VELOCITY =      400.0
MIN_LINEAR_VELOCITY =      0.0
DEFAULT_ANGULAR_VELOCITY = 100
MAX_ANGULAR_VELOCITY =     300
MIN_ANGULAR_VELOCITY =     0.0
INCREMENTS =               90 45 10 1 0.1 0.01 0.001
GRIDS =                    100
# leave OPEN_FILE off while trying to figure whats the issue
# OPEN_FILE =                ~/linuxcnc/nc_files/qtpyvcp/qtpyvcp.ngc
EDITOR =                   geany
GEOMETRY =                 X Y Z A B C
CONFIG_FILE =              custom_config.yml
TOOL_EDITOR =              tooledit
ROBOT =                    models/meca500.yml
TABLE =                    models/meca500/meca500_base.stl
SPINDLE =                  models/meca500/spindle_assy.stl
GEOMETRY =                 X Y Z A B C


[VTK]
CPP_BACKPLOT = 0


[FILTER]
PROGRAM_EXTENSION = .png,.gif,.jpg Greyscale Depth Image
PROGRAM_EXTENSION = .py Python Script
png = image-to-gcode
gif = image-to-gcode
jpg = image-to-gcode
py = python

[RS274NGC]
PARAMETER_FILE  = linuxcnc.var
SUBROUTINE_PATH = ../../CIC0700/subroutines
FEATURES = 8
RS274NGC_STARTUP_CODE = G10 L2 P1 X0 Y0 Z0 A0 B0 C0 G54 T99
# when homed with T99 machine should be X190 Y0 Z308 A0 B90 C0

[EMCMOT]
EMCMOT =           motmod
BASE_PERIOD =      50000
SERVO_PERIOD =     1000000
TRAJ_PERIOD =      100000
COMM_TIMEOUT =     1.0
HOMEMOD =          homemod

[TASK]
TASK =             milltask
CYCLE_TIME =       0.010

[HAL]
HALUI   =          halui
HALFILE =          real-meca500-core.hal
HALFILE =          real-meca500-robot-cfg.hal
HALFILE =          meca500-kinematics.hal
POSTGUI_HALFILE =  meca500-postgui.hal

[HALUI]

[TRAJ]
COORDINATES =                  X Y Z A B C
ARC_BLEND_ENABLE =             1
ARC_BLEND_FALLBACK_ENABLE =    0
ARC_BLEND_OPTIMIZATION_DEPTH = 50
ARC_BLEND_GAP_CYCLES =         4
ARC_BLEND_RAMP_FREQ =          100
SPINDLES =                     1
LINEAR_UNITS =                 mm
ANGULAR_UNITS =                deg
DEFAULT_LINEAR_VELOCITY =      400.0
MAX_LINEAR_VELOCITY =          400.0
DEFAULT_LINEAR_ACCELERATION =  100.0
MAX_LINEAR_ACCELERATION =      100.0
MAX_ANGULAR_VELOCITY =         2000.0
NO_FORCE_HOMING =              1
HOME =                         0 -90 0 0 180 0

[KINS]
KINEMATICS = genserkins coordinates=xyzabc
JOINTS =     6

[AXIS_X]
MAX_VELOCITY =     400
MAX_ACCELERATION = 100
MIN_LIMIT =       -350.0
MAX_LIMIT =        350.0


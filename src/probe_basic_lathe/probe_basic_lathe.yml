{% include "menubar.yml" %}

qtdesigner:
  ui_file: ( windows.mainwindow.kwargs.ui_file )
  qss_file: ( application.kwargs.stylesheet )

vcp:
  name: Probe Basic Lathe
  version: v0.0.1
  author: Chris Polanski
  description: |
    Probe Basic lathe VCP.

data_plugins:
  status:
    kwargs:
      cycle_time: 75

  gcode_properties:
    provider: qtpyvcp.plugins.gcode_properties:GCodeProperties

windows:
  mainwindow:
    provider: probe_basic_lathe.probe_basic_lathe:ProbeBasicLathe
    kwargs:
      menu: ( menubar )
      fullscreen: true
      ui_file: {{ file.dir }}/probe_basic_lathe.ui

application:
  kwargs:
    stylesheet: {{ file.dir }}/probe_basic_lathe_{{ effective_theme_color('DISPLAY', 'THEME_COLOR', 'light') }}.qss

settings:
  backplot.show-grid:
    default_value: 0
    persistent: true
    min_value: 0
    max_value: 1

  backplot.show-program-bounds:
    default_value: 0
    persistent: true
    min_value: 0
    max_value: 1

  backplot.show-program-labels:
    default_value: 0
    persistent: true
    min_value: 0
    max_value: 1

  backplot.show-program-ticks:
    default_value: 0
    persistent: true
    min_value: 0
    max_value: 1

  backplot.show-machine-bounds:
    default_value: 0
    persistent: true
    min_value: 0
    max_value: 1

  backplot.show-machine-labels:
    default_value: 0
    persistent: true
    min_value: 0
    max_value: 1

  backplot.show-machine-ticks:
    default_value: 0
    persistent: true
    min_value: 0
    max_value: 1

  backplot.perspective-view:
    description: perspective or ortho views.
    default_value: 0
    persistent: true
    min_value: 0
    max_value: 1

  backplot.view:
    default_value: 0
    options: ["XZ: Lathe View",
              "XZ2: Lathe View"]

  css-settings.surface-speed:
    description: constant surface speed.
    default_value: 0.0
    persistent: true
    min_value: -10000
    max_value: 10000

  css-settings.max-rpm:
    description: max spindle speed.
    default_value: 0.0
    persistent: true
    min_value: -10000
    max_value: 10000

  feed-settings.feed-per-rev:
    description: feed per revolution.
    default_value: 0.0
    persistent: true
    min_value: -10000
    max_value: 10000

  feed-settings.feed-per-unit:
    description: feed per unit.
    default_value: 0.0
    persistent: true
    min_value: -100000
    max_value: 100000

  rpm-settings.rpm-s-word:
    description: spindle speed S word.
    default_value: 0.0
    persistent: true
    min_value: -10000
    max_value: 10000

  startup-settings.user-startup-tab:
    description: startup tab preference setting.
    default_value: "STATUS"
    persistent: true
    options: ["MAIN", "FILE", "OFFSETS", "TOUCH OFF", "TOOL TABLE", "PROBING", "CONVERSATIONAL", "SETTINGS", "STATUS", "USER"]

  startup-settings.usb-hide-show:
    description: hide or show usb file manager
    persistent: true
  
dialogs:
  about_probebasic:
    provider: probe_basic_lathe.about_dialog:AboutDialog
    kwargs:
      ui_file: {{ file.dir }}/about.ui

  toolchange:
    provider: qtpyvcp.widgets.dialogs.toolchange_dialog:ToolChangeDialog
    kwargs:
      ui_file: {{ file.dir }}/toolchange_dialog_pb.ui

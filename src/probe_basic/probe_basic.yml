    description: default base diameter for hole circle op
    default_value: 0.0000
    persistent: true

  conv-hole.start-angle:
    description: default start angle for hole circle op
    default_value: 0.0000
    persistent: true

  conv-hole.num-holes:
    description: default number of holes for hole circle op
    default_value: 0.0000
    persistent: true

  # Conversational Hole Circle combo defaults

  conv-hole.wcs:
    description: last used work coordinate system for hole circle op
    default_value: 0   # index: G54
    options:
      - G54
      - G55
      - G56
      - G57
      - G58
      - G59
      - G59.1
      - G59.2
      - G59.3
    persistent: true

  conv-hole.unit:
    description: last used program unit for hole circle op
    default_value: 0   # index: IN
    options:
      - IN
      - MM
    persistent: true

  conv-hole.drill-retract-mode:
    description: last used drill retract mode for hole circle op
    default_value: 0   # index: G98
    options:
      - G98
      - G99
    persistent: true

  conv-hole.coolant:
    description: last used coolant mode for hole circle op
    default_value: 0   # index: OFF
    options:
      - OFF
      - MIST
      - FLOOD
    persistent: true

  conv-hole.drill-type-select:
    description: last used drill type selection for hole circle op
    default_value: 0   # index: DRILL
    options:
      - DRILL
      - PECK
      - BREAK
      - DWELL
      - TAP
      - RIGID TAP
      - MANUAL
    persistent: true

  conv-hole.spindle-direction:
    description: last used spindle direction for hole circle op
    default_value: 0   # index: CW
    options:
      - CW
      - CCW
    persistent: true

  # Conversational Facing defaults

  conv-facing.tool-number:
    description: default tool number for facing op
    default_value: 0
    persistent: true
    min_value: 0
    max_value: 10000

  conv-facing.spindle-rpm:
    description: default spindle RPM for facing op
    default_value: 0
    persistent: true

  conv-facing.xy-feed:
    description: default XY feed rate for facing op
    default_value: 0.0
    persistent: true

  conv-facing.z-feed:
    description: default Z feed rate for facing op
    default_value: 0.0
    persistent: true

  conv-facing.clearance-height:
    description: default clearance height for facing op
    default_value: 0.0000
    persistent: true

  conv-facing.x-start:
    description: default x start for facing op
    default_value: 0.0
    persistent: true

  conv-facing.y-start:
    description: default y start for facing op
    default_value: 0.0
    persistent: true

  conv-facing.z-start:
    description: default z start for facing op
    default_value: 0.0

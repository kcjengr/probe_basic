    persistent: true

  # Conversational Facing combo defaults

  conv-facing.wcs:
    description: last used work coordinate system for facing op
    default_value: 0   # index: G54
    options:
      - G54
      - G55
      - G56
      - G57
      - G58
      - G59
      - G59.1
      - G59.2
      - G59.3
    persistent: true

  conv-facing.unit:
    description: last used program unit for facing op
    default_value: 0   # index: IN

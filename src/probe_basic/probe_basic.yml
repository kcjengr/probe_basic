      - MIST
      - FLOOD
    persistent: true

  conv-facing.spindle-direction:
    description: last used spindle direction for facing op
    default_value: 0   # index: CW
    options:
      - CW
      - CCW
    persistent: true

dialogs:
  about_probebasic:
    provider: probe_basic.about_dialog:AboutDialog
    kwargs:
      ui_file: {{ file.dir }}/about.ui

  toolchange:
    provider: qtpyvcp.widgets.dialogs.toolchange_dialog:ToolChangeDialog
    kwargs:
      ui_file: {{ file.dir }}/toolchange_dialog_pb.ui
